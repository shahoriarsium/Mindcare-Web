<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — MindCare Center</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>Your Cart</h1>
      <p>Review your booked consultation sessions before checkout.</p>
    </div>
  </div>

  <section class="cart-page">
    <div class="container" id="cart-content"></div>
  </section>

  <div id="site-footer"></div>

  <script src="data.js"></script>
  <script src="cart.js"></script>
  <script src="main.js"></script>
  <script>
    initPage('cart');

    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cart-content');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="cart-empty">
            <h2>Your cart is empty</h2>
            <p>Browse our consultants and book a session to get started.</p>
            <a href="consultants.html" class="btn btn-primary">Browse Consultants</a>
          </div>
        `;
        return;
      }

      const total = getCartTotal();
      container.innerHTML = `
        <div class="cart-items">
          ${cart.map(item => `
            <div class="cart-item" data-id="${item.id}">
              <img src="${item.image}" alt="${item.consultantName}" class="cart-item-img">
              <div class="cart-item-info">
                <h3>${item.consultantName}</h3>
                <p>${item.specialty} · ${item.duration}</p>
                <p>📅 ${formatDate(item.date)} at ${item.time}</p>
              </div>
              <div class="cart-item-price">${formatPrice(item.price)}</div>
              <button class="btn btn-danger remove-btn" data-id="${item.id}">Remove</button>
            </div>
          `).join('')}
        </div>
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal (${cart.length} session${cart.length > 1 ? 's' : ''})</span>
            <span>${formatPrice(total)}</span>
          </div>
          <div class="summary-row">
            <span>Service fee</span>
            <span>$0.00</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span>${formatPrice(total)}</span>
          </div>
          <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top: 1rem;">Proceed to Checkout</a>
        </div>
      `;

      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          removeFromCart(btn.dataset.id);
          renderCart();
          showToast('Session removed from cart.');
        });
      });
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    renderCart();
  </script>
</body>
</html>
