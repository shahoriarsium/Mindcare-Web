<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — MindCare Center</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <h1>Checkout</h1>
      <p>Enter your details to complete your booking.</p>
    </div>
  </div>

  <div class="container checkout-grid" id="checkout-content"></div>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    initPage('cart');

    const cart = getCart();
    const container = document.getElementById('checkout-content');

    if (cart.length === 0) {
      container.innerHTML = `
        <div class="cart-empty" style="grid-column: 1 / -1;">
          <h2>Nothing to checkout</h2>
          <p>Your cart is empty. Add a consultation session first.</p>
          <a href="consultants.html" class="btn btn-primary">Browse Consultants</a>
        </div>
      `;
    } else {
      const total = getCartTotal();
      container.innerHTML = `
        <form class="checkout-form" id="checkout-form">
          <h2>Your Information</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" required placeholder="John">
            </div>
            <div class="form-group">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" required placeholder="Doe">
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required placeholder="+1 (555) 000-0000">
          </div>
          <div class="form-group">
            <label for="notes">Notes for your consultant (optional)</label>
            <input type="text" id="notes" placeholder="Brief description of your concerns">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Continue to Payment</button>
        </form>

        <div class="order-summary">
          <h3>Order Summary</h3>
          ${cart.map(item => `
            <div class="summary-item">
              <span>${item.consultantName}<br><small style="color: var(--color-text-muted);">${item.date} · ${item.time}</small></span>
              <span>${formatPrice(item.price)}</span>
            </div>
          `).join('')}
          <div class="summary-row total" style="margin-top: 1rem;">
            <span>Total</span>
            <span>${formatPrice(total)}</span>
          </div>
        </div>
      `;

      document.getElementById('checkout-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const checkoutData = {
          firstName: document.getElementById('first-name').value,
          lastName: document.getElementById('last-name').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          notes: document.getElementById('notes').value
        };
        sessionStorage.setItem('mindcare_checkout', JSON.stringify(checkoutData));
        window.location.href = 'payment.html';
      });
    }
  </script>
</body>
</html>
